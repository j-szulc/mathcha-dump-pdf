[tools]
bun = "1.3.10"

[tasks.install]
description = "Install project dependencies"
env = { PUPPETEER_SKIP_DOWNLOAD = "true" }
run = "bun install"

[tasks.run]
description = "Run the Mathcha CLI"
run = "bun run start --"

[tasks.default]
description = "Install dependencies and run the Mathcha CLI"
run = "mise run install && mise run run --"

[tasks.test]
description = "Run tests"
run = "bun test"